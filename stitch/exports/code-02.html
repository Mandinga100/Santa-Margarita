<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#141414",
                        "background-light": "#f7f7f7",
                        "background-dark": "#191919",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .backdrop-blur-sm {
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<!-- Main Container: Simulating a mobile viewport on desktop for context as requested -->
<div class="relative flex min-h-screen w-full items-center justify-center p-4">
<!-- Background: Mock Individual Memorial Page (Slightly Dimmed) -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none opacity-40 grayscale-[0.5]">
<div class="max-w-[480px] mx-auto h-full bg-white shadow-2xl flex flex-col">
<header class="p-6 flex justify-between items-center border-b border-slate-100">
<div class="w-8 h-8 rounded-full bg-slate-200"></div>
<div class="w-24 h-4 bg-slate-100 rounded"></div>
<div class="w-8 h-8 rounded-full bg-slate-200"></div>
</header>
<div class="p-6 space-y-6">
<div class="w-full aspect-[4/5] bg-slate-100 rounded-xl" data-alt="Black and white professional portrait of an elderly person"></div>
<div class="space-y-2 text-center">
<div class="h-8 w-3/4 bg-slate-100 mx-auto rounded"></div>
<div class="h-4 w-1/2 bg-slate-50 mx-auto rounded"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="h-24 bg-slate-50 rounded-lg border border-slate-100"></div>
<div class="h-24 bg-slate-50 rounded-lg border border-slate-100"></div>
</div>
<div class="space-y-4">
<div class="h-4 w-full bg-slate-100 rounded"></div>
<div class="h-4 w-5/6 bg-slate-100 rounded"></div>
<div class="h-4 w-4/6 bg-slate-100 rounded"></div>
</div>
</div>
</div>
</div>
<!-- Dimming Overlay -->
<div class="fixed inset-0 bg-primary/40 backdrop-blur-sm z-10"></div>
<!-- Notification Modal: Centered Mobile Content -->
<div class="relative z-20 w-full max-w-[360px] transform transition-all">
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden px-8 py-10 flex flex-col items-center text-center">
<!-- Close Icon (Top Right) -->
<button class="absolute top-4 right-4 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<!-- Visual: Minimalist olive branch/flower -->
<div class="mb-8 flex items-center justify-center">
<div class="w-20 h-20 bg-primary/5 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-primary/60 font-light" style="font-variation-settings: 'opsz' 48, 'wght' 200;">
                            psychology_alt
                        </span>
</div>
</div>
<!-- Typography -->
<div class="space-y-3 mb-10">
<h2 class="text-3xl font-serif text-slate-900 dark:text-slate-100 tracking-tight leading-tight">
                        Mensaje enviado
                    </h2>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-relaxed">
                        Gracias por sus palabras de apoyo
                    </p>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-slate-800 text-white font-bold py-4 px-6 rounded-lg transition-all duration-200 active:scale-[0.98] shadow-lg shadow-primary/10 tracking-wide text-sm">
                    Cerrar
                </button>
</div>
<!-- Minimal Bottom Branding (Optional) -->
<div class="mt-6 text-center">
<p class="text-white/60 text-xs font-medium uppercase tracking-[0.2em]">Memorial Platform</p>
</div>
</div>
</div>
</body></html>
