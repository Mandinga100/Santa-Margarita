<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background-light": "#f7f7f7",
                        "background-dark": "#191919",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Newsreader', serif;
        }
        .form-input-minimal {
            border: none;
            border-bottom: 1px solid #e2e8f0;
            border-radius: 0;
            padding-left: 0;
            padding-right: 0;
        }
        .form-input-minimal:focus {
            ring: 0;
            border-bottom: 2px solid #000000;
            outline: none;
            box-shadow: none;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col bg-white dark:bg-background-dark max-w-[480px] mx-auto shadow-2xl">
<!-- Header -->
<header class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 px-6 py-4 sticky top-0 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md z-50">
<div class="flex items-center gap-3">
<div class="text-primary dark:text-slate-100">
<span class="material-symbols-outlined text-3xl">fluid</span>
</div>
<h1 class="text-primary dark:text-slate-100 text-lg font-semibold tracking-tight uppercase text-xs">Aeterna</h1>
</div>
<button class="flex items-center justify-center rounded-full w-10 h-10 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">menu</span>
</button>
</header>
<main class="flex-1 flex flex-col px-8 pt-8 pb-32">
<!-- Stepper Indicator -->
<div class="mb-10">
<div class="flex items-center justify-between mb-3">
<div class="flex items-center gap-2">
<span class="text-primary dark:text-slate-100 font-bold text-xl">Datos</span>
<span class="text-slate-400 dark:text-slate-500 text-sm">Paso 1 de 4</span>
</div>
<div class="flex gap-1">
<div class="h-1 w-8 rounded-full bg-primary dark:bg-slate-100"></div>
<div class="h-1 w-8 rounded-full bg-slate-200 dark:bg-slate-800"></div>
<div class="h-1 w-8 rounded-full bg-slate-200 dark:bg-slate-800"></div>
<div class="h-1 w-8 rounded-full bg-slate-200 dark:bg-slate-800"></div>
</div>
</div>
<div class="w-full bg-slate-100 dark:bg-slate-800 h-1 rounded-full overflow-hidden">
<div class="bg-primary dark:bg-slate-100 h-full w-1/4"></div>
</div>
</div>
<!-- Headline -->
<div class="text-center mb-12">
<h2 class="text-3xl font-display font-medium text-slate-900 dark:text-slate-100 mb-2">Paso 1: Información de Contacto</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm italic">Comencemos con los detalles básicos para su cotización.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-10">
<div class="relative group">
<label class="block text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500 font-bold mb-1 group-focus-within:text-primary transition-colors">Nombre</label>
<input class="form-input-minimal w-full bg-transparent text-lg text-slate-900 dark:text-slate-100 py-3" placeholder="Ej. Juan Carlos" type="text"/>
</div>
<div class="relative group">
<label class="block text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500 font-bold mb-1 group-focus-within:text-primary transition-colors">Apellidos</label>
<input class="form-input-minimal w-full bg-transparent text-lg text-slate-900 dark:text-slate-100 py-3" placeholder="Ej. Pérez García" type="text"/>
</div>
<div class="relative group">
<label class="block text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500 font-bold mb-1 group-focus-within:text-primary transition-colors">Teléfono</label>
<input class="form-input-minimal w-full bg-transparent text-lg text-slate-900 dark:text-slate-100 py-3" placeholder="+52 00 0000 0000" type="tel"/>
</div>
<div class="relative group">
<label class="block text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500 font-bold mb-1 group-focus-within:text-primary transition-colors">Email</label>
<input class="form-input-minimal w-full bg-transparent text-lg text-slate-900 dark:text-slate-100 py-3" placeholder="correo@ejemplo.com" type="email"/>
</div>
</form>
</main>
<!-- Navigation Bar (Fixed Bottom) -->
<footer class="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto bg-white/90 dark:bg-background-dark/90 backdrop-blur-lg border-t border-slate-100 dark:border-slate-800 p-6 flex flex-col items-center gap-4">
<button class="w-full bg-primary dark:bg-slate-100 text-white dark:text-primary py-5 rounded-lg font-bold text-base tracking-widest uppercase hover:opacity-90 transition-opacity">
                Siguiente
            </button>
<button class="text-slate-400 dark:text-slate-500 text-sm font-medium hover:text-primary dark:hover:text-slate-100 transition-colors py-2">
                Atrás
            </button>
</footer>
</div>
</body></html>
