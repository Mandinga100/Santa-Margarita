<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background-light": "#f7f7f7",
                        "background-dark": "#121212",
                        "accent": "#64748b"
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"],
                        "sans": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-serif-display {
            font-family: 'Newsreader', serif;
        }
        .form-input-minimal {
            border: none;
            border-bottom: 2px solid #e2e8f0;
            border-radius: 0;
            padding-left: 0;
            padding-right: 0;
            transition: border-color 0.2s;
        }
        .form-input-minimal:focus {
            ring: 0;
            border-bottom: 2px solid #000000;
            outline: none;
            box-shadow: none;
        }
        .dark .form-input-minimal {
            border-bottom-color: #334155;
        }
        .dark .form-input-minimal:focus {
            border-bottom-color: #f8fafc;
        }
        .nav-item {
            @apply flex flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400;
        }
        .nav-item.active {
            @apply text-primary dark:text-white;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col bg-white dark:bg-background-dark max-w-[480px] mx-auto shadow-2xl overflow-hidden">
<header class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 px-6 py-4 sticky top-0 bg-white/90 dark:bg-background-dark/90 backdrop-blur-md z-50">
<div class="flex items-center gap-3">
<div class="text-primary dark:text-slate-100">
<span class="material-symbols-outlined text-3xl">fluid</span>
</div>
<h1 class="text-primary dark:text-slate-100 font-bold tracking-widest uppercase text-xs">Aeterna</h1>
</div>
<button aria-label="Menu" class="flex items-center justify-center rounded-full w-10 h-10 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">menu</span>
</button>
</header>
<main class="flex-1 flex flex-col px-8 pt-8 pb-48">
<div class="mb-10">
<div class="flex items-center justify-between mb-4">
<div class="flex flex-col">
<span class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider">Progreso</span>
<span class="text-primary dark:text-slate-100 font-serif-display font-bold text-2xl italic">Datos de Contacto</span>
</div>
<div class="text-right">
<span class="text-slate-400 dark:text-slate-500 text-sm font-medium">1 de 4</span>
</div>
</div>
<div class="w-full bg-slate-100 dark:bg-slate-800 h-1.5 rounded-full overflow-hidden">
<div class="bg-primary dark:bg-slate-100 h-full w-1/4 transition-all duration-500"></div>
</div>
</div>
<div class="mb-10">
<h2 class="text-3xl font-serif-display font-medium text-slate-900 dark:text-slate-100 mb-3 leading-tight">Comencemos con su cotización</h2>
<p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed">Por favor, proporcione su información básica para enviarle una propuesta personalizada.</p>
</div>
<form class="flex flex-col gap-8">
<div class="relative group">
<label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 transition-colors">NOMBRE COMPLETO</label>
<input class="form-input-minimal w-full bg-transparent text-xl text-slate-900 dark:text-slate-100 py-3" placeholder="Ej. Juan Carlos" type="text"/>
</div>
<div class="relative group">
<label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 transition-colors">APELLIDOS</label>
<input class="form-input-minimal w-full bg-transparent text-xl text-slate-900 dark:text-slate-100 py-3" placeholder="Ej. Pérez García" type="text"/>
</div>
<div class="relative group">
<label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 transition-colors">TELÉFONO DE CONTACTO</label>
<input class="form-input-minimal w-full bg-transparent text-xl text-slate-900 dark:text-slate-100 py-3" placeholder="55 1234 5678" type="tel"/>
</div>
<div class="relative group">
<label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 transition-colors">CORREO ELECTRÓNICO</label>
<input class="form-input-minimal w-full bg-transparent text-xl text-slate-900 dark:text-slate-100 py-3" placeholder="correo@ejemplo.com" type="email"/>
</div>
</form>
</main>
<footer class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-white dark:bg-background-dark z-[60] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
<div class="px-6 pt-4 pb-2">
<button class="w-full bg-primary dark:bg-slate-100 text-white dark:text-primary py-5 rounded-xl font-bold text-lg tracking-wide uppercase hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-lg shadow-black/10 dark:shadow-white/5">
                Continuar
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<nav class="flex items-center justify-around py-3 border-t border-slate-100 dark:border-slate-800">
<a class="nav-item active" href="#">
<span class="material-symbols-outlined">description</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Cotizar</span>
</a>
<a class="nav-item" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Inicio</span>
</a>
<a class="nav-item" href="#">
<span class="material-symbols-outlined">call</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Ayuda</span>
</a>
<a class="nav-item" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Perfil</span>
</a>
</nav>
<div class="h-4 bg-white dark:bg-background-dark"></div>
</footer>
</div>

</body></html>
