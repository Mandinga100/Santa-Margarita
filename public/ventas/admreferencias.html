<div class="box-header">
    <div class="table-responsive">
        <table id="tabla_referencias" class="table table-striped  table-bodered table-hover table-jasa" width="100%">
            <thead>
                <tr>
                    <th>Acciones</th>
                    <th>Referencia</th>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Secuencia</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Gestor</th>

                </tr>
            </thead>
        </table>
    </div>
</div>





<script>
    datos = "";
    IdRef = 0;
    IdEntidad = 0;
    usuario = [];


    autoriza = 'F'
    modal_accion = ''
    html_home = "selfunadm.html";
    html_volver = "selfunfun.html";
    datos = [];

    table = $('#tabla_referencias').DataTable(

        {
            "scrollY": "310px",
            "scrollCollapse": true,
            "language": spanish,
            "lengthMenu": [[10, 25, 50, -1], [10, 25, 50, "Todos"]],
            columnDefs: [
                { width: '15%', targets: 0, className: "text-left" },
                { width: '20%', targets: 1, className: "text-left" },
                { width: '20%', targets: 2, className: "text-left" },
                { width: '10%', targets: 3, className: "text-left" },
                { width: '10%', targets: 4, className: "text-left" },
                { width: '10%', targets: 5, className: "text-left" },
                { width: '15%', targets: 6, className: "text-left" },

            ]
        }
    );



    appModulo = 'Gestión de Selecciones';

    if (localStorage.getItem("usuario") != null) {
        usuario = JSON.parse(window.atob(localStorage.getItem("usuario")));
    }
    else {
        confirm("No es posible ejecutar esta aplicación sin autentificacion")
        close();
    }

    setTimeout(() => {
        $("#btn_nuevo").hide()
        $("#btn_exportar").hide()
        $('#btn_volver').click(function (event) {
            $('#jasa_container').empty().load(html_volver);
        });
        $('#btn_home').click(function (event) {
            $('#jasa_container').empty().load(html_home);
        });
    }, 100);
    cargaEntidades("IdEntidadCab")

    $("#IdEmpresa").val(usuario.IdEmpresa);
    $("#IdUsuario").val(usuario.IdUsuario);




    cargaTitulo();

    // BOTONES VARIOS
    function Volver() {

        $('#jasa_container').empty().load(html_volver);
    }
    function Home() {

        $('#jasa_container').empty().load(html_home);
    };
    // CAMPOS A VALIDAR CUANDO CAMBIAN 

    $('#Seleccion').change(function () { validaCampoBlanco('Seleccion') });
    $('#Descripcion').change(function () { validaCampoBlanco('Descripcion') });

    cargaSelecciones();




    // BOTONES VARIOS


    $('#btn_exportar').click(function () {
        console.log('en exportar');
        nombrehoja = "Selecciones_" + $("#IdEntidadCab").val() + "_" + hoydma();
        tableToExcel('tabla_referencias', nombrehoja, 1)
    });

    $('#btn_nuevo').click(function () {
        resetErrores('form_referencia');
        iniciaFormulario('form_referencia');
        //   cargaSeleccionesSelectPadre(usuario.IdEmpresa, 'IdSelPadre', $('#IdEntidadCab').find(":selected").text())

        accionActualizacion = "insert";
        $("#IdEmpresa").val(usuario.IdEmpresa);
        $("#IdEntidad").val($("#IdEntidadCab").val());
        $("#Estado").val("Activo");
        $("#Fecha").val(hoy());
        $("#IdUsuario").val(usuario.IdUsuario);
        $('#modal_referencia').modal('show')
    });
    // INSERTA O ACTUALIZA REGISTRO

    $('#btn_grabar').click(function () {
        $("#Codigo").val(zanitize($("#Codigo").val()));
        $("#Nombre").val(zanitize($("#Nombre").val()));
        $("#IdUsuario").val(usuario.IdUsuario);
        let myform = document.getElementById("form_referencia");
        let fd = new FormData(myform);

        fd.append('Accion', accionActualizacion);

        if (validarForm()) {
            var url = "php/crud_referencias.php";
            $.ajax({
                type: "POST",
                url: url,
                data: fd,
                async: false,
                processData: false,
                contentType: false,
                dataType: "JSON",
                success: function (data) {
                    $('#info_text1').text(data.mensaje)
                    cargaSelecciones();
                    cargaTablaSelecciones();
                },
                error: function () {
                    $('#info_text1').text(data.mensaje)
                }
            });
            $('#modal_referencia').modal('hide');
            $('#modal_info').modal('show');

        }
    });
    // VALIDACION DEL form_referencia
    function validarForm() {
        if (!validaCampoBlanco('Codigo')) { return false }
        if (!validaCampoBlanco('Nombre')) { return false }
        if (consultaExiste('Codigo')) { return false }

        return true;
    };
    // MANEJO RESPUESTA MODAL


    function cargaSelecciones() {


        if ($("#IdEntidadCab").val() != 0) {

            $("#btn_nuevo").show()
            $("#btn_exportar").hide()
            $.ajax({
                type: "POST",
                url: 'php/crud_referencias.php',

                data: {

                    'IdEntidad': $("#IdEntidadCab").val(),
                    'IdEmpresa': usuario.IdEmpresa,
                    'Accion': "list"
                },
                dataType: "JSON",
                async: false,
                cache: false,
                success: function (data) {
                    $('#tabla_referencias').DataTable().clear().draw();
                    parsedData = data.data;
                    $.each(parsedData, function (key, item) {
                        $('#tabla_referencias').dataTable().fnAddData([
                            item.Acciones,
                            item.Entidad,
                            item.Codigo,
                            item.Nombre,
                            item.Secuencia,
                            item.Estado,
                            item.Fecha,
                            item.Usuario
                        ]);
                    });
                },
            });
        } else {
            $("#btn_nuevo").hide()
            $("#btn_exportar").hide()
        }
    }


    function consultaExiste(codigo) {
        swcode = false
        if (accionActualizacion == 'insert') {
            $.ajax(
                {
                    type: "POST",
                    url: "php/crud_referencias.php",
                    data: { IdEmpresa: usuario.IdEmpresa, IdEntidad: $("#IdEntidadCab").val(), Code: $("#" + codigo).val(), Accion: 'getcode' },
                    dataType: "JSON",
                    async: false,

                    success: function (dataRet) {
                        if (dataRet.resultado == 0) {
                            $("#" + codigo).removeClass('entrada-valida').addClass('entrada-invalida')
                            $("#" + codigo + "_err").removeClass('campo-valido').addClass('campo-invalido').text("Código ya existe")
                            swcode = true;
                        } else {
                            swcode = false;
                        }
                    }
                });
        }
        return swcode;
    }

    function Modificar(IdRef) {
        resetErrores('form_referencia')
        iniciaFormulario('form_referencia');
        //   cargaSeleccionesSelectPadre(usuario.IdEmpresa, 'IdSelPadre', $('#IdEntidadCab').find(":selected").text())

        accionActualizacion = "update";
        $.ajax(
            {
                type: "POST",
                url: "php/crud_referencias.php",
                data: { IdReferencia: IdRef, Accion: 'get' },
                dataType: "JSON",
                async: true,

                success: function (dataRet) {
                    d = dataRet.data;
                    $("form#form_referencia input , form#form_referencia select").each(function () {
                        $(this).val(d[this.name])
                    });
                    $("form#form_referencia input[type=number]").each(function () {
                        $(this).val(Number($(this).val()).toLocaleString('es-ES'))
                    });
                    $('#modal_referencia').modal('show')
                }
            });


    };
    function Eliminar(Id) {
        modal_accion = 'Eliminar'
        IdRef = Id;
        deplegarModalConsulta("¿Desea eliminar Selección  ?", "Sí", "No")

    };
    // Manejo respuesta modal

    function modalContinuar() {

        modalCancelar();
        if (modal_accion == 'Eliminar') {
            var url = "php/crud_referencias.php";
            $.ajax({
                type: "POST",
                url: url,
                data: { IdReferencia: IdRef, Accion: 'delete' },
                dataType: "JSON",
                async: false,
                success: function (dataRet) {
                    $('#info_text1').text(dataRet.mensaje)
                    cargaSelecciones()
                },
                error: function () {
                    $('#info_text1').text(dataRet.mensaje)
                    cargaSelecciones()
                }
            });
            cargaTablaSelecciones();
            $('#modal_info').modal('show');

        }
        modal_accion = "";
    };



</script>

</html>
