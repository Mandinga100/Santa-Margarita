<html>

<body>

  <style>
    .respo {
      width: 100%;
      padding-left: 10px;
      padding-right: 10px;
    }

  </style>
  <div class="row">
    <div class="col_40"></div>
    <div class="col_20">
      <div id="cuadro_login" class="cuadro-login center-screen">
        <div class="row">
          <div class="col_100">
            <div class="jasa-login-header">Acceso</div>
          </div>
        </div><br>
        <div class="row">
          <div class="col_100">
            <table>
              <colgroup>
                <col style="width: 10%;">
                <col style="width: 90%;">
              </colgroup>
              <tr>
                <td style="min-width: none;"><i class="fa fa-envelope text-teme-color"></i></td>
                <td> <input type="text" class="form-control" placeholder="Correo electrónico" id="usua_mail"
                    name="usua_mail" autocomplete="on"></td>
              </tr>
            </table>
          </div>
        </div><br>
        <div class="row">
          <div class="col_100">
            <table>
              <colgroup>
                <col style="width: 10%;">
                <col style="width: 90%;">

              </colgroup>
              <tr>
                <td><i class="fa fa-lock text-teme-color"></i></td>
                <td> <input type="password" class="form-control" placeholder="Clave" id='usua_pwd' name='usua_pwd'
                    value="" autocomplete="current-password"></input>
                </td>

              </tr>
            </table>
          </div>
        </div><br>
        <div class="row">
          <div class="col_100">
            <input type="checkbox" id='btn_recordar' class="text-teme-color"><span
              class="text-teme-color">&ensp;Recuerdame</span></input>
          </div>
        </div>

        <div class="row oculto" id="grp_entrar">
          <div class="col_100">
            <btn class="btn jasa-btn float-end text-teme-color" id='btn_entrar' onclick="validarEntrar()">Entrar
          </div>
        </div>

        <div class="row oculto" id="grp_registrar">
          <div class="col_100">
            <div>
              <btn class="btn jasa-btn float-end  text-teme-color" id='btn_registrar ' onclick="validarRegistrar()">
                Registrese
            </div>
          </div>
        </div>
        <div class="row oculto" id="grp_olvido">
          <div class="col_100">
            <btn class="btn jasa-btn float-end text-teme-color" id='btn_olvido' onclick="recuperarPassword()">
              Recuperar
          </div>
        </div>
        <br>
        <div class="row">
          <div class="col_100 jasa-login-texto" id="error_texto">
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
<script id="erasable" type="text/javascript">

  $('#header_jasa').empty().load("./htmls/header_00.html", function () {
    appModulo = 'Plataforma Integrada de Gestión';
    cargaTitulo();
    $('#container_jasa').addClass('container-jasa-main');
  });


  document.getElementById('cuadro_login').addEventListener('keypress', function (event) {
    if (event.keyCode == 13) {
      event.preventDefault();
      validaDatos('1')
    }
  });

  $('#usua_mail').change(function () { validaDatos('0') });
  $('#usua_pwd').change(function () { validaDatos('0') });



  function validaDatos(swlogin) {
    resetErroresLogin();
    if (validaMailUsuario()) {

      if (consultaLoginUsuario()) {
        if (!esBlanco($("#usua_pwd").val())) {
          if ($("#usua_pwd").val() == usuario.password) {
            if (swlogin == '1') { iniciarSesion(); } else {
              $("#grp_entrar").removeClass('oculto')

            }
            return true;
          }
          else {
            $("#usua_pwd").focus()
            $('#grp_olvido').removeClass('oculto')
            $('#error_texto').removeClass('campo-valido').addClass('campo-invalido')
            $('#error_texto').text("Clave no coincide")
            verPassword("usua_pwd");
            hablar(usuario.nombre + ',revisa tu contraseña')
            return false
          }

        } else {

          return false

        }

      } else {
        $("#grp_registrar").removeClass('oculto')
        return false

      }

    } else {

      return false
    }

  }
  function resetErroresLogin() {
    $('#grp_olvido').addClass('oculto')
    $("#grp_entrar").addClass('oculto')
    $("#grp_registrar").addClass('oculto')
    $('#error_texto').text("")


    $('#usua_mail').removeClass('entrada-invalida').addClass('entrada-valida')
    $('#usua_pwd').removeClass('entrada-invalida').addClass('entrada-valida')

  }

  function validaMailUsuario() {
    mailok = false;
    $('#usua_mail').val($('#usua_mail').val().toLowerCase());
    if (validaMail("usua_mail") == false || esBlanco($('#usua_mail').val())) {
      $('#usua_mail').removeClass('entrada-valida').addClass('entrada-invalida')
      $('#error_texto').removeClass('campo-valido').addClass('campo-invalido')
      $('#error_texto').text("Correo eléctronico no es válido")

    } else {
      mailok = true
      $("#usua_pwd").focus()
      $("#grp-recuerdame").show()

    }
    return mailok;
  }

  function consultaLoginUsuario() {
    mailok = false
    $.ajax({
      type: "POST",
      url: "php/crud_usuarios.php",
      data: { Code: $('#usua_mail').val(), Accion: 'getcode' },
      dataType: "JSON",
      async: false,

      success: function (data) {

        switch (data.resultado) {
          case 0:
            {
              mailok = true;

            }
            break;
          case 1:
            $('#error_texto').removeClass('campo-valido').addClass('campo-invalido')
            $('#error_texto').text("No es usuario del sistema.")
            hablar('Usted no es usuario del sistema')
            break;

          case 9:
            $('#error_texto').removeClass('campo-valido').addClass('campo-invalido')
            $('#error_texto').text("No se puede acceder al sistema, codigo 9.")
            break;
          default:
            break;
        }
        cargaArrayUsuario(data.data)
      }

    });
    return mailok
  }

  function validarEntrar() {
    console.log('en validar entrar')
    if (validaDatos('0')) {
      iniciarSesion();
    }
  }

  function iniciarSesion() {
    console.log(" en iniciar")
    $('#btn_volver').unbind("click");
    $("#footer_ jasaservices").hide();

    if (usuario.estado != 'Activo') {
      $('#alert_text1').text("Usted no está activo(a) en el sistema")
      $('#modal_alert').modal('show')
      return false
    }
    console.log(usuario.perfil)
    $('#container_jasa').removeClass('container-jasa-main').addClass('container-jasa');

    if (usuario.perfil == 1) {

      $('#header_jasa').empty().load("./htmls/header_01.html", function () {
        cargaTitulo();
        $('#container_jasa').empty().load('selfungral.html', function () { $('#footer_jasa').hide() });
      });

    } else {
      if (usuario.accesos[0] == 'S' || usuario.accesos[0] == 'R') {


        datospgm = {
          Titulo: "Gestionar Contratos",
          IdTipo: usuario.accesos[0],
          Mode: usuario.accesos[0]
        };
        localStorage.setItem("datospgm", window.btoa(JSON.stringify(datospgm)))
        $('#container_jasa').empty().load('listacontratos.html');
      } else {
        $("#acceso_text1").text('Ud. no tiene acceso a esta función.')
        $('#modal_acceso').modal('show')
      }

    }

  };


  $("#show_hide_password i").on('click', function (event) {
    event.preventDefault();
    if ($('#show_hide_password input').attr("type") == "text") {
      $('#show_hide_password input').attr('type', 'password');
      $('#show_hide_password i').addClass("fa-eye-slash");
      $('#show_hide_password i').removeClass("fa-eye");
    } else if ($('#show_hide_password input').attr("type") == "password") {
      $('#show_hide_password input').attr('type', 'text');
      $('#show_hide_password i').removeClass("fa-eye-slash");
      $('#show_hide_password i').addClass("fa-eye");
    }
  });
  function recuperarPassword() {
    var url = 'php/' + "envia_mail_pwd.php";
    $.ajax({
      type: "POST",
      url: url,
      async: false,
      data: {
        "mail_asunto": "Solicitud de cambio de contraseña",
        "mail_plantilla": "maillinkpass.html",
        "usua_mail": usuario.mail,
        "usua_ide": usuario.ide,
        "usua_nombre": usuario.nombre + " " + usuario.app1 + " " + usuario.app2,

      },
      async: false,
      success: function (response) {
        mailmask = usuario.mail.replace(usuario.mail.substring(5, 11), "*******")
        textomodal = "Para respablecer su contraseña,  se ha enviado un mensaje a su correo electrónico: " + mailmask + ". El cambio solo se puede realizar antes de transcurridas 24 horas.";
        textoboton1 = "Entendido"

        deplegarModalInformacion(textomodal, textoboton1);


      },
      error: function (jqXHR, textStatus, errorThrown) {
        $('#info_text1').text("No se puede restablecer su contraseña");
        $("#modal_info").show();
      }
    })

  }

  function modalContinuar() {
    $("#modal_info").hide();
    return;

  }
  function checkLoginCookies() {
    usuamail = document.getElementById("usua_mail").value
    if (getCookie(usuamail) != "") {
      val = getCookie(usuamail)
      document.getElementById("usua_pwd").value = val;
      document.getElementById("btn_recordar").checked = true;
    }
  };


  function cargaArrayUsuario(data) {
    console.log("en carga array")
    acce = data.Text1
    usuario = {
      mail: data.Mail,
      ide: data.Codigo,
      nombre: data.Nombre,
      perfil: data.IdRol,
      estado: data.Estado,
      password: data.Password,
      IdUsuario: data.IdUsuario,
      IdEmpresa: data.IdEmpresa,
      IdPersonal: data.IdPersonal,

      accesos: acce.split(''),

    }
    console.log("acce=" + data.Text1)
    console.log(usuario.accesos)
    localStorage.setItem("usuario", window.btoa(JSON.stringify(usuario)))
  }

  document.getElementById('erasable').innerHTML = "";
</script>

</html>
