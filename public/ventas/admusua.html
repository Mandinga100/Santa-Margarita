<!DOCTYPE html>
<div class="container-fluid">
    <br>
    <div class="row">
        <div class="col_10">&ensp;Usuarios</div>
        <div class="col_35">
        </div>

        <div class="col_45"></div>
        <div class="col_05">
            <button type="button" class="btn btn_jasa_01" id="btn_exportar" style="float: right"><i
                    class="fa fa-file-excel-o"></i></button>
        </div>
        <div class="col_05">
            <button type="button" class="btn btn_jasa_01" id="btn_nuevo" style="float: right"><i
                    class="fa fa-user"></i>+</button>
        </div>
    </div>

    <!--Modal -->
    <div class="modal fade" id="modal_usuario">
        <div class="modal-dialog modal-lg">
            <div class="modal-content modal-jasa">
                <!-- Modal Header -->
                <div class="modal-header">
                    <h4 class="modal-title">Datos del usuario</h4>
                    <button type="button" class="btn-close" aria-label="Close" data-bs-dismiss="modal"></button>

                </div>
                <div class="modal-body">

                    <div class="jasa-big-box">
                        <form class="form-horizontal" id="form_usuario" method="GET">
                            <input type="number" id="IdEmpresa" class="jasa-txt-01" name="IdEmpresa" hidden />
                            <input type="number" id="IdUsuario" class="jasa-txt-01" name="IdUsuario" hidden />
                            <input type="number" id="IdGestor" class="jasa-txt-01" name="IdGestor" hidden />

                            <div class="box-body">
                                <div class="row">

                                    <div class="col-sm-9">
                                        <div class="form-group">
                                            <label class="control-label" for="usua_nombre">Nombre </label>
                                            <div>
                                                <input type="text" id="Nombre" class="jasa-txt-01" name="Nombre"
                                                    placeholder="Nombre del usuario" />

                                                <div>
                                                    <small id="Nombre_err" class="campo-valido"></small>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <br>

                                <div class="row">
                                    <div class="col-sm-6">
                                        <div class="form-group">
                                            <label class="form-control-label" for="Mail">Correo electrónico</label>
                                            <input type="text" class="jasa-txt-01" id="Mail" name="Mail"
                                                placeholder="Correo del usuario" />
                                            <small id="Mail_err" class="campo-valido">
                                            </small>

                                        </div>
                                    </div>
                                    <div class="col-sm-4">
                                        <div class="form-group">
                                            <label class="control-label" for="Password">Contraseña</label>
                                            <input type="text" class="jasa-txt-01" id="Password" name="Password"
                                                placeholder="Contraseña ..." />

                                            <small id="Password_err" class="campo-valido">
                                            </small>

                                        </div>
                                    </div>
                                </div>

                                <br>
                                <div class="row">
                                    <div class="col-sm-4">
                                        <div class="form-group">
                                            <label class="control-label" for="IdRol">Rol</label>
                                            <div>
                                                <select class="jasa-txt-01" id="IdRol" name="IdRol"
                                                    placeholder="Seleccione...">
                                                </select>
                                            </div>
                                            <small id="IdRol_err" class="campo-valido">
                                            </small>

                                        </div>
                                    </div>
                                    <div class="col-sm-5 oculto">
                                        <div class="form-group">
                                            <label class="control-label" for="IdPersonal">Docente</label>
                                            <div>
                                                <select class="jasa-txt-01" id="IdPersonal" name="IdPersonal"
                                                    placeholder="Seleccione...">
                                                </select>
                                            </div>
                                            <small id="IdPersonal_err" class="campo-valido">
                                            </small>

                                        </div>
                                    </div>
                                </div>

                                <br>
                                <div class="row">
                                    <div class="col-sm-4">

                                        <div class="form-group">
                                            <label class="control-label" for="Estado">Estado </label>
                                            <div>
                                                <select class="jasa-txt-01" id="Estado" name="Estado">
                                                    <option value="Activo">Activo</option>
                                                    <option value="Bloqueado">Bloqueado</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <br>
                                <div class="row">
                                    <div class="col-sm-4">
                                        <div class="form-group">
                                            <label disabled class="control-label" for="Fecha">Fecha de
                                                creación</label>
                                            <div>
                                                <input type="date" class="jasa-txt-01" id="Fecha" name="Fecha"
                                                    placeholder="dd/mm/aaaa" readonly />
                                                <small id="Fecha_err" class="campo-valido">
                                                </small>

                                            </div>
                                        </div>

                                    </div>

                                </div>
                                <br>
                                <div class="row">
                                    <div class="col-sm-10">
                                        <div class="form-group">
                                            <button type="button" class="btn btn-outline-primary" id="btn_grabar"
                                                style='float: left'>
                                                <i class="fa fa-save"> </i> Guardar</button>
                                        </div>
                                    </div>
                                    <div class="col-sm-2">
                                        <a type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal"
                                            id="btn_cerrar" style='float: right;'>Cerrar</a>
                                    </div>
                                </div>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="box-header">
        <div class="table-responsive">
            <table id="usuarios" class="table table-striped  table-bodered table-hover table-jasa" width="100%">
                <thead>
                    <tr>
                        <th>Acciones</th>
                        <th>Nombre</th>
                        <th>Mail</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Fecha</th>
                        <th>Gestor</th>

                    </tr>
                </thead>
            </table>
        </div>
    </div>
</div>
<!-- Tabla End -->
<script>
    datos = "";
    IdUser = 0;
    usuario = [];

    autoriza = 'F'
    modal_accion = ''
    html_home = "selfunadm.html";
    html_volver = "selfunfun.html";

    appModulo = 'Gestión de Usuarios';

    datos = [];



    if (localStorage.getItem("usuario") != null) {
        usuario = JSON.parse(window.atob(localStorage.getItem("usuario")));
    }
    else {
        confirm("No es posible ejecutar esta aplicación sin autentificacion")
        close();
    }

    setTimeout(() => {


        $('#btn_volver').click(function (event) {
            $('#jasa_container').empty().load(html_volver);
        });
        $('#btn_home').click(function (event) {
            $('#jasa_container').empty().load(html_home);
        });


    }, 100);
    $("#IdEmpresa").val(usuario.IdEmpresa);
    $("#IdGestor").val(usuario.IdUsuario);

    console.log(usuario.accesos)


    cargaTitulo();

    // BOTONES VARIOS
    $('#btn_volver').click(function (event) {

        $('#container_jasa').empty().load(html_volver);

    });
    $('#btn_home').click(function (event) {

        $('#container_jasa').empty().load(html_home);
    });


    // CAMPOS A VALIDAR CUANDO CAMBIAN 

    $('#Nombre').change(function () { validaCampoNombre('Nombre') });
    $('#Mail').change(function () { validaCampoMail('Mail') });

    carga_usuario(0);
    cargaSelects();


    // BOTONES VARIOS

    $('#btn_exportar').click(function () {
        console.log('en exportar')
        nombrehoja = "Usuarios_" + hoydma();
        tableToExcel('usuarios', nombrehoja, 1)
    });


    $('#btn_nuevo').click(function () {
        resetErrores('form_usuario');
        iniciaFormulario('form_usuario');
        cargaSelects()
        accionActualizacion = "insert";
        $("#IdEmpresa").val(usuario.IdEmpresa);
        $("#Estado").val("Activo");
        $("#Fecha").val(hoy());
        $("#IdGestor").val(usuario.IdUsuario);
        $('#modal_usuario').modal('show')
    });
    // INSERTA O ACTUALIZA REGISTRO

    $('#btn_grabar').click(function () {
        $("#Mombre").val(zanitize($("#Nombre").val()));
        $("#Mail").val(zanitize($("#Mail").val()));
        $("#IdGestor").val(usuario.IdUsuario);
        let myform = document.getElementById("form_usuario");
        let fd = new FormData(myform);

        fd.append('Accion', accionActualizacion);

        if (validarForm()) {
            var url = "php/crud_usuarios.php";
            $.ajax({
                type: "POST",
                url: url,
                data: fd,
                async: false,
                processData: false,
                contentType: false,
                dataType: "JSON",
                success: function (data) {
                    $('#info_text1').text(data.mensaje)
                    carga_usuario(1);
                },
                error: function () {
                    $('#info_text1').text(data.mensaje)
                }
            });
            $('#modal_usuario').modal('hide');
            $('#modal_info').modal('show');
            $('#modal_info').modal('show');
        }
    });
    // VALIDACION DEL FORMULARIO
    function validarForm() {
        if (!validaCampoNombre('Nombre')) { return false }
        if (!validaCampoNombre('Mail')) { return false }
        if (!validaCampoMail('Mail')) { return false }
        if (!validaCampoBlanco('IdRol')) { return false }
        if (!validaCampoBlanco('Password')) { return false }
        if (consultaExiste('Mail')) { return false }



        return true;
    };
    // MANEJO RESPUESTA MODAL


    function carga_usuario(sw) {
        if (sw == 0) {
            table = $('#usuarios').DataTable(

                {
                    "scrollY": "310px",
                    "scrollCollapse": true,
                    "language": spanish,
                    "lengthMenu": [[10, 25, 50, -1], [10, 25, 50, "Todos"]],
                    columnDefs: [
                        { width: '15%', targets: 0, className: "text-left" },
                        { width: '20%', targets: 1, className: "text-left" },
                        { width: '20%', targets: 2, className: "text-left" },
                        { width: '10%', targets: 3, className: "text-left" },
                        { width: '10%', targets: 4, className: "text-left" },
                        { width: '10%', targets: 5, className: "text-left" },
                        { width: '15%', targets: 6, className: "text-left" },

                    ]
                }
            );
        }

        $.ajax({
            type: "POST",
            url: 'php/crud_usuarios.php',

            data: {
                'IdEmpresa': usuario.IdEmpresa,
                'Accion': "list"
            },
            dataType: "JSON",
            async: false,
            cache: false,
            success: function (data) {
                $('#usuarios').DataTable().clear().draw();

                parsedData = data.data;
                $.each(parsedData, function (key, item) {
                    $('#usuarios').dataTable().fnAddData([
                        item.Acciones,
                        item.Nombre,
                        item.Mail,
                        item.Rol,
                        item.Estado,
                        item.Fecha,
                        item.Creador
                    ]);
                });
            },
        });
    }


    function consultaExiste(codigo) {
        swcode = false
        if (accionActualizacion == 'insert') {
            $.ajax(
                {
                    type: "POST",
                    url: "php/crud_usuarios.php",
                    data: { Code: $("#" + codigo).val(), Accion: 'getcode' },
                    dataType: "JSON",
                    async: false,

                    success: function (dataRet) {
                        if (dataRet.resultado == 0) {
                            $("#" + codigo).removeClass('entrada-valida').addClass('entrada-invalida')
                            $("#" + codigo + "_err").removeClass('campo-valido').addClass('campo-invalido').text("Código ya existe")
                            swcode = true;
                        } else {
                            swcode = false;
                        }
                    }
                });
        }
        return swcode;
    }


    // ACCIONES EN LAS FILAS
    function Modificar(IdUser) {
        resetErrores('form_usuario')
        iniciaFormulario('form_usuario');
        cargaSelects()
        accionActualizacion = "update";
        $.ajax(
            {
                type: "POST",
                url: "php/crud_usuarios.php",
                data: { IdUsuario: IdUser, Accion: 'get' },
                dataType: "JSON",
                async: true,

                success: function (dataRet) {
                    d = dataRet.data;
                    $("form#form_usuario input , form#form_usuario select").each(function () {
                        $(this).val(d[this.name])
                    });
                    $("form#form_usuario input[type=number]").each(function () {
                        $(this).val(Number($(this).val()).toLocaleString('es-ES'))
                    });
                    $('#modal_usuario').modal('show')
                }
            });

    };
    function Eliminar(Id) {
        modal_accion = 'Eliminar'
        IdUser = Id;
        deplegarModalConsulta("¿Desea eliminar usuario  ?", "Sí", "No")

    };
    // Manejo respuesta modal

    function modalContinuar() {

        modalCancelar();
        if (modal_accion == 'Eliminar') {
            var url = "php/crud_usuarios.php";
            $.ajax({
                type: "POST",
                url: url,
                data: { IdUsuario: IdUser, Accion: 'delete' },
                dataType: "JSON",
                async: false,
                success: function (dataRet) {
                    $('#info_text1').text(dataRet.mensaje)
                    carga_usuario(1)
                },
                error: function () {
                    $('#info_text1').text(dataRet.mensaje)
                    carga_usuario(1)
                }
            });
            $('#modal_info').modal('show');

        }
        modal_accion = "";
    };
    function cargaSelects() {
        cargaSeleccionesSelect(usuario.IdEmpresa, 'IdRol', 'PERFILES');
        cargaSelectDocentes(usuario.IdEmpresa, 'IdPersonal');
    }
</script>

</html>
