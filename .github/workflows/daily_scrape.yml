name: Daily Obituary Scrape

on:
  schedule:
    # Corre todos los días a las 09:00 AM CL (UTC-3). 
    # UTC 12:00 = 09:00 Santiago
    - cron: '0 12 * * *'
  workflow_dispatch: # Permite correrlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scripts/scraper_obituarios.py

      - name: Commit and Push results
        run: |
          git config --global user.name "Santa Margarita Bot"
          git config --global user.email "bot@funerariasantamargarita.cl"
          git add obituarios_eticos.json audit_hash.txt scraper_etico.log
          git commit -m "Auto-Scrape: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin master
